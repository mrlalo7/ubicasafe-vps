# Nginx reverse proxy for UbicaSafe RAG Backend
# Place this in /etc/nginx/sites-available/ubicasafe and symlink to sites-enabled.
# Replace YOUR_DOMAIN with your actual domain or IP.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # TODO(security): Add SSL/TLS with Let's Encrypt in production:
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for embedding generation (can take a few seconds)
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Max body size for report submissions
        client_max_body_size 1m;
    }

    # Block non-API paths
    location / {
        return 404;
    }
}
